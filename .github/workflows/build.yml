# ============================================================
#  JARVIS — Cross-Platform Build Workflow
#  Builds Windows .exe, Linux binary, and Android APK
#  Only runs when manually triggered (workflow_dispatch)
# ============================================================

name: Build JARVIS

on:
  workflow_dispatch:
    inputs:
      note:
        description: 'Build note (optional)'
        required: false
        default: 'Manual deploy'

jobs:

  # ──────────────────────────────────────────────
  #  WINDOWS BUILD
  # ──────────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade pyinstaller

      - name: Build with PyInstaller
        continue-on-error: false
        run: |
          pyinstaller --onedir ^
            --name "JARVIS" ^
            --add-data "config;config" ^
            --add-data "core;core" ^
            --add-data "vendor;vendor" ^
            --add-data ".env.example;." ^
            --hidden-import openai ^
            --hidden-import anthropic ^
            --hidden-import sounddevice ^
            --hidden-import edge_tts ^
            --hidden-import pygame ^
            --hidden-import cv2 ^
            --hidden-import mediapipe ^
            --hidden-import chromadb ^
            --hidden-import sentence_transformers ^
            --hidden-import psutil ^
            --hidden-import yaml ^
            --hidden-import rich ^
            --hidden-import numpy ^
            --hidden-import scipy ^
            --hidden-import huggingface_hub ^
            --hidden-import tokenizers ^
            --hidden-import transformers ^
            --hidden-import hnswlib ^
            --collect-all chromadb ^
            --collect-all sentence_transformers ^
            --collect-all numpy ^
            --collect-all transformers ^
            --collect-all tokenizers ^
            --collect-all cv2 ^
            --collect-all ultralytics ^
            --collect-all huggingface_hub ^
            main.py
        shell: cmd

      - name: Copy config files
        if: success()
        run: |
          xcopy /E /I /Y config dist\JARVIS\config
          copy /Y .env.example dist\JARVIS\.env.example
          copy /Y README.md dist\JARVIS\README.md

      - name: Upload Windows artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: JARVIS-Windows
          path: dist/JARVIS/
          retention-days: 7

  # ──────────────────────────────────────────────
  #  LINUX BUILD
  # ──────────────────────────────────────────────
  build-linux:
    name: Linux (Binary)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libportaudio2 portaudio19-dev \
            libsdl2-dev libsdl2-2.0-0 \
            libsm6 libxext6 libxrender-dev \
            libgomp1 \
            ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --upgrade pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onedir \
            --name "JARVIS" \
            --add-data "config:config" \
            --add-data "core:core" \
            --add-data "vendor:vendor" \
            --add-data ".env.example:." \
            --hidden-import openai \
            --hidden-import anthropic \
            --hidden-import sounddevice \
            --hidden-import edge_tts \
            --hidden-import pygame \
            --hidden-import cv2 \
            --hidden-import mediapipe \
            --hidden-import chromadb \
            --hidden-import sentence_transformers \
            --hidden-import psutil \
            --hidden-import yaml \
            --hidden-import rich \
            --hidden-import numpy \
            --hidden-import scipy \
            --hidden-import huggingface_hub \
            --hidden-import tokenizers \
            --hidden-import transformers \
            --hidden-import hnswlib \
            --collect-all chromadb \
            --collect-all sentence_transformers \
            --collect-all numpy \
            --collect-all transformers \
            --collect-all tokenizers \
            --collect-all cv2 \
            --collect-all ultralytics \
            --collect-all huggingface_hub \
            main.py

      - name: Copy config files
        if: success()
        run: |
          cp -r config dist/JARVIS/config/
          cp .env.example dist/JARVIS/.env.example

      - name: Create launcher
        if: success()
        run: |
          cat > dist/JARVIS/run.sh << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          cd "$DIR"
          ./JARVIS
          EOF
          chmod +x dist/JARVIS/run.sh

      - name: Upload Linux artifact
        if: success()
        uses: actions/upload-artifact@v5
        with:
          name: JARVIS-Linux
          path: dist/JARVIS/
          retention-days: 7

  # ──────────────────────────────────────────────
  #  ANDROID TERMUX ARCHIVE
  # ──────────────────────────────────────────────
  build-android-termux:
    name: Android (Termux ZIP)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Create Termux package
        run: |
          mkdir -p termux-package
          cp -r core termux-package/core/
          cp -r config termux-package/config/
          cp -r vendor termux-package/vendor/
          cp main.py termux-package/
          cp requirements.txt termux-package/
          cp .env.example termux-package/

          cat > termux-package/install.sh << 'EOF'
          #!/data/data/com.termux/files/usr/bin/bash
          echo "Installing JARVIS for Termux..."
          pkg update -y
          pkg install -y python portaudio ffmpeg
          pip install -r requirements.txt
          echo "JARVIS installed! Run: python main.py"
          EOF
          chmod +x termux-package/install.sh

      - name: Upload Termux ZIP
        uses: actions/upload-artifact@v5
        with:
          name: JARVIS-Android-Termux
          path: termux-package/
          retention-days: 7

  # ──────────────────────────────────────────────
  #  BUILD SUMMARY
  # ──────────────────────────────────────────────
  summary:
    name: Build Summary
    needs: [build-windows, build-linux, build-android-termux]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Print build results
        run: |
          echo "╔═══════════════════════════════════════════╗"
          echo "║     JARVIS BUILD SUMMARY                  ║"
          echo "╚═══════════════════════════════════════════╝"
          echo ""
          echo "  Windows: JARVIS.exe (standalone)"
          echo "  Linux:   JARVIS binary (standalone)"
          echo "  Android: Termux package"
          echo ""
          echo "  To deploy:"
          echo "    https://github.com/${{ github.repository }}/actions"
