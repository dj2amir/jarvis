# ============================================================
#  JARVIS — Release Workflow
#  Creates a GitHub Release with all platform builds
#  Triggered by pushing a tag like v1.0.0
# ============================================================

name: Release JARVIS

on:
  push:
    tags:
      - 'v*'  # v1.0.0, v2.1.3, etc.

jobs:

  # ── Build all platforms (single call — avoids 3x redundant builds) ──
  build-all:
    name: Build All Platforms
    uses: ./.github/workflows/build.yml
    secrets: inherit

  # ── Create Release ──
  release:
    name: Create Release
    needs: [build-all]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Needed to create releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create release archive
        run: |
          mkdir -p release
          
          # Zip up each platform build
          cd artifacts/JARVIS-Windows
          zip -r ../../release/JARVIS-Windows-x64.zip .
          cd ../..
          
          cd artifacts/JARVIS-Linux
          tar -czf ../../release/JARVIS-Linux-x64.tar.gz .
          cd ../..
          
          # Copy Android artifacts if they exist
          if [ -d "artifacts/JARVIS-Android" ]; then
            cp artifacts/JARVIS-Android/*.apk release/ 2>/dev/null || true
          fi
          
          # Copy Termux package
          if [ -d "artifacts/JARVIS-Android-Termux" ]; then
            cd artifacts/JARVIS-Android-Termux
            zip -r ../../release/JARVIS-Android-Termux.zip .
            cd ../..
          fi

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > release-notes.md << EOF
          ## 🤖 JARVIS v${VERSION}
          
          ### 📦 Downloads
          
          | Platform | Download | Size |
          |----------|----------|------|
          | 🪟 Windows 10/11 | \`JARVIS-Windows-x64.zip\` | ~500MB |
          | 🐧 Linux (any distro) | \`JARVIS-Linux-x64.tar.gz\` | ~500MB |
          | 📱 Android (APK) | \`JARVIS-*.apk\` | ~200MB |
          | 📱 Android (Termux) | \`JARVIS-Android-Termux.zip\` | ~10MB |
          
          ### 🚀 Quick Start
          
          **Windows:** Extract ZIP and run \`JARVIS.exe\`
          **Linux:** Extract and run \`./run.sh\`
          **Android (APK):** Install the APK
          **Android (Termux):** Extract ZIP, run \`bash install-termux.sh\`
          
          ### 🔑 First Run
          1. Copy \`.env.example\` to \`.env\`
          2. Add your API keys (OpenAI, Anthropic, etc.)
          3. Launch JARVIS
          
          ### 🎭 Features
          - Animated face with 3 styles and 10 emotions
          - Voice interaction (requires API keys)
          - AI-powered reasoning
          - Self-evolution (generates its own tools)
          - Memory system
          - Vision capabilities
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: JARVIS v${{ github.ref_name }}
          body_path: release-notes.md
          files: |
            release/JARVIS-Windows-x64.zip
            release/JARVIS-Linux-x64.tar.gz
            release/JARVIS-*.apk
            release/JARVIS-Android-Termux.zip
          draft: false
          prerelease: false
