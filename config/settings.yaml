# JARVIS Configuration
general:
  name: JARVIS
  user_name: Sir

face:
  mode: terminal
  style: robot

voice:
  # Speech-to-Text: openai (Whisper API) or local (faster-whisper)
  stt_provider: local
  # Text-to-Speech: edge-tts (free) or openai (premium)
  tts_provider: edge-tts
  tts_voice: default
  tts_speed: 1.0
  tts_volume: 0.8
  audio_sample_rate: 16000
  audio_input_device: null
  silence_threshold: 10
  silence_timeout: 1.2
  max_record_seconds: 30
  wake_word_enabled: true
  wake_word: jarvis

brain:
  primary_provider: openai
  model: qwen2.5-coder-14b-instruct
  streaming: true
  max_history_tokens: 6000

memory:
  enabled: true
  storage_path: ./memory_store
  log_path: ./logs
  max_history_tokens: 6000
  max_history_messages: 20
  auto_extract_facts: true

vision:
  enabled: false
  camera_id: 0

hardware:
  enabled: false
  mode: simulation
